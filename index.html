<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <link rel="stylesheet" href="style.css">

<body>
    <section id="banner" class="container">

        <div class="poderes-item">
            <img src="imagens/poderes/flor-fogo.jpg" alt="cogumelo-voador">

        <div class="poderes-item">
            <img src="imagens/poderes/flor-gelo.jpg" alt="cogumelo-voador">

        <div class="poderes-item">
            <img src="imagens/poderes/pinguim.jpg" alt="cogumelo-voador">
